services:
  headscale:
    image: ${HEADSCALE_IMAGE}
    container_name: headscale
    restart: unless-stopped
    command: serve
    volumes:
      - ./config/headscale:/etc/headscale
      - ./data/headscale:/var/lib/headscale
    ports:
      - 8080:8080
    networks:
      - vpn
  headplane:
    image: ${HEADPLANE_IMAGE}
    container_name: headplane
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./config/headplane:/etc/headplane
    depends_on:
      - headscale
    networks:
      - vpn

  caddy:
    image: ${CADDY_IMAGE}
    container_name: caddy
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./data/caddy:/data
    depends_on:
      - headscale
      - headplane
    networks:
      - vpn
networks:
  vpn: null
